name: Release gshell

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            name: gshell-linux-amd64
          - os: linux
            arch: arm64
            name: gshell-linux-arm64
          - os: darwin
            arch: amd64
            name: gshell-darwin-amd64
          - os: darwin
            arch: arm64
            name: gshell-darwin-arm64
          - os: windows
            arch: amd64
            name: gshell-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Generate secret
        run: |
          SECRET_KEY=$(openssl rand -hex 32)
          echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV

      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build \
          -ldflags "-X github.com/pawannn/gshell/internal/security.SecretKey=${{ env.SECRET_KEY }}" \
          -o ${{ matrix.name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}